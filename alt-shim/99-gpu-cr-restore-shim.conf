# /etc/crio/crio.conf.d/99-gpu-cr-restore.conf
# Registers the `gpu-cr-restore` runtime handler used by the gpu-cr-restore
# RuntimeClass. CRI-O calls our shim as the OCI runtime; the shim proxies to
# crun for everything except a restore-annotated create.
#
# Install: copy to /etc/crio/crio.conf.d/ and `systemctl restart crio`.

[crio.runtime]
# CRIU is what actually dumps/restores the container's CPU process.
enable_criu_support = true

[crio.runtime.runtimes.gpu-cr-restore]
runtime_path = "/usr/local/bin/gpu-cr-restore-shim"
runtime_type = "oci"
runtime_root = "/run/crun"
# CRI-O only forwards annotations a runtime explicitly allows into config.json.
# These are what the shim reads to drive the restore.
allowed_annotations = [
  "gpu-cr.io/restore",
  "gpu-cr.io/checkpoint-uri",
  "gpu-cr.io/source-pod-uid",
]
