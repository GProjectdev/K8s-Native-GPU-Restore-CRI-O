# RuntimeClass that routes a Pod to CRI-O's gpu-cr-restore handler (our shim).
# A Pod selects it with `spec.runtimeClassName: gpu-cr-restore`.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gpu-cr-restore
handler: gpu-cr-restore
# Pin restore Pods to GPU nodes that have the handler installed.
scheduling:
  nodeSelector:
    nvidia.com/gpu.present: "true"
