# /etc/crio/crio.conf.d/99-gpu-cr-restore.conf
# Enables CRIU restore and registers the GPU-restore OCI hooks directory for the
# custom CRI-O build (see hack/build-crio.sh + crio-patch/).
[crio.runtime]
enable_criu_support = true
# Directory scanned for OCI hooks (the gpu-cr-restore poststart hook lives here).
hooks_dir = [
  "/usr/local/lib/gpu-cr-restore/oci-hooks",
  "/usr/share/containers/oci/hooks.d",
  "/etc/containers/oci/hooks.d",
]
