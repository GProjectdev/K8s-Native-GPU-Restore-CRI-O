# Restore a checkpointed GPU workload into a NEW Pod on a chosen node, using the
# Custom CRI-O native restore path (no custom RuntimeClass needed).
#
# How it works:
#   - container `image` is the checkpoint archive PATH on the node. CRI-O detects
#     a local archive and drives a CRIU restore (CRImportCheckpoint).
#   - gpu-cr.io/checkpoint-uri tells the patched CRI-O where to STAGE that archive
#     from first (so a node that doesn't have it yet — migration — gets it). For a
#     same-node restore where the tar already exists, the URI can equal the image.
#   - the gpu-cr-restore OCI poststart hook then restores GPU control state + data.
#
# Flow: 1 apply -> 2 node (nodeSelector) -> 2.5 CRI-O stages tar -> 3 kubelet/CRI-O
#       -> 4 CRIU restore -> 5 GPU control (hook) -> 6 GPU data remap (hook)
#       -> 7 resume -> 8 registered Running.
apiVersion: v1
kind: Pod
metadata:
  name: restore-vllm
  namespace: default
  annotations:
    gpu-cr.io/restore: "true"
    gpu-cr.io/checkpoint-uri: "hostpath:///var/lib/gcr-checkpoint/Checkpoint.tar"
    # UID of the ORIGINAL checkpointed Pod — the in-Pod interceptor watches a
    # control channel keyed by this UID (CRIU restores the original env). Get it:
    #   kubectl get pod <src> -o jsonpath='{.metadata.uid}'
    gpu-cr.io/source-pod-uid: "REPLACE_WITH_SOURCE_POD_UID"
spec:
  # Experiment: pin the target node explicitly (no scheduler integration yet).
  nodeSelector:
    kubernetes.io/hostname: jsj-worker-1
  restartPolicy: Never
  containers:
    - name: vllm
      # The container image IS the checkpoint archive on the node. CRI-O stages
      # it from checkpoint-uri (above) before restore, so this local path exists.
      image: /var/lib/gpu-cr/restore/vllm-Checkpoint.tar
      resources:
        limits:
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: gpu-cr-lib
          mountPath: /opt/gpu-cr
          readOnly: true
        - name: gpu-cr-run
          mountPath: /var/lib/gpu-cr/run
        - name: gcr-checkpoint
          mountPath: /var/lib/gcr-checkpoint
  volumes:
    - name: gpu-cr-lib
      hostPath: { path: /var/lib/gpu-cr/lib, type: Directory }
    - name: gpu-cr-run
      hostPath: { path: /var/lib/gpu-cr/run, type: DirectoryOrCreate }
    - name: gcr-checkpoint
      hostPath: { path: /var/lib/gcr-checkpoint, type: DirectoryOrCreate }
