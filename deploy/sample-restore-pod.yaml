# Restore a checkpointed GPU workload into a NEW Pod on a chosen node.
#
# Flow this triggers:
#   1) you apply this Pod         (Restore Pod yaml)
#   2) nodeSelector pins the node (experiment: explicit target node)
#   3) kubelet -> CRI-O (gpu-cr-restore handler / our shim)
#   2.5) shim stages Checkpoint.tar from checkpoint-uri onto the node
#   4) crun restore  (CRIU: container + CPU process)
#   5) GPU control-state restore (cuda-checkpoint --restore via host helper)
#   6) GPU data-buffer remap (interceptor: same VA + H2D)
#   7) workload resumes
#   8) CRI-O/kubelet register it as a normal Running container
apiVersion: v1
kind: Pod
metadata:
  name: restore-vllm
  namespace: default
  annotations:
    gpu-cr.io/restore: "true"
    # Where the Checkpoint.tar is. Same-node restore: hostpath:// (the checkpoint
    # backend dir, /var/lib/gcr-checkpoint, present on every node). Cross-node
    # migration: file:// after pre-staging, nfs://, or https://.
    gpu-cr.io/checkpoint-uri: "hostpath:///var/lib/gcr-checkpoint/Checkpoint.tar"
    # UID of the ORIGINAL (checkpointed) Pod. The in-Pod interceptor watches a
    # control channel keyed by this UID (CRIU restores the original env), so the
    # shim must signal the data-buffer remap on this key. Read it from the source
    # Pod: `kubectl get pod <src> -o jsonpath='{.metadata.uid}'`.
    gpu-cr.io/source-pod-uid: "REPLACE_WITH_SOURCE_POD_UID"
spec:
  runtimeClassName: gpu-cr-restore
  # Scheduler step: experiment pins the target node explicitly.
  nodeSelector:
    kubernetes.io/hostname: jsj-worker-1
  restartPolicy: Never
  containers:
    - name: vllm
      # Must be the image the checkpoint was taken from (CRIU restores into a
      # compatible rootfs).
      image: pytorch/pytorch:2.4.0-cuda12.1-cudnn9-runtime
      resources:
        limits:
          nvidia.com/gpu: "1"
      # The interceptor library + control channel must be present for the GPU
      # data remap, exactly as on the checkpoint side.
      volumeMounts:
        - name: gpu-cr-lib
          mountPath: /opt/gpu-cr
          readOnly: true
        - name: gpu-cr-run
          mountPath: /var/lib/gpu-cr/run
        - name: gcr-checkpoint
          mountPath: /var/lib/gcr-checkpoint
  volumes:
    - name: gpu-cr-lib
      hostPath: { path: /var/lib/gpu-cr/lib, type: Directory }
    - name: gpu-cr-run
      hostPath: { path: /var/lib/gpu-cr/run, type: DirectoryOrCreate }
    - name: gcr-checkpoint
      hostPath: { path: /var/lib/gcr-checkpoint, type: DirectoryOrCreate }
