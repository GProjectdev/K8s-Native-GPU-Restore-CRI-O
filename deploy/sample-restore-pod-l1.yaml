# Level-1 restore smoke test (Custom CRI-O native path). Restores the cuda-l1
# checksum workload and confirms the GPU tensor checksum still matches.
apiVersion: v1
kind: Pod
metadata:
  name: restore-cuda-l1
  namespace: default
  labels: { app: cuda-l1-restore }
  annotations:
    gpu-cr.io/restore: "true"
    gpu-cr.io/checkpoint-uri: "hostpath:///var/lib/gcr-checkpoint/Checkpoint.tar"
    gpu-cr.io/source-pod-uid: "REPLACE_WITH_SOURCE_POD_UID"
spec:
  nodeSelector:
    kubernetes.io/hostname: jsj-worker-1
  restartPolicy: Never
  containers:
    - name: cuda-app
      # kubelet validates image as an OCI reference (a filesystem path -> InvalidImageName).
      # Use a valid, node-present reference; the gpu-cr.io/* annotations drive the actual
      # restore (the CRI-O patch swaps in the staged checkpoint archive internally).
      image: pytorch/pytorch:2.4.0-cuda12.1-cudnn9-runtime
      imagePullPolicy: IfNotPresent
      resources:
        limits:
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: gpu-cr-lib
          mountPath: /opt/gpu-cr
          readOnly: true
        - name: gpu-cr-run
          mountPath: /var/lib/gpu-cr/run
        - name: gcr-checkpoint
          mountPath: /var/lib/gcr-checkpoint
        - name: gcr-data
          mountPath: /var/lib/gcr-data
  volumes:
    - name: gpu-cr-lib
      hostPath: { path: /var/lib/gpu-cr/lib, type: Directory }
    - name: gpu-cr-run
      hostPath: { path: /var/lib/gpu-cr/run, type: DirectoryOrCreate }
    - name: gcr-checkpoint
      hostPath: { path: /var/lib/gcr-checkpoint, type: DirectoryOrCreate }
    - name: gcr-data
      hostPath: { path: /var/lib/gcr-data, type: DirectoryOrCreate }
